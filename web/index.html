<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahima Ministry Connect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <section class="card">
      <div class="brand">
        <div class="logo">MM</div>
        <h1>Mahima Ministry</h1>
        <p>Audio Prayer Platform</p>
      </div>

      <div class="form-box">
        <input id="nameInput" type="text" placeholder="আপনার নাম লিখুন" />

        <select id="roleInput">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>

        <select id="roomInput">
          <option value="morning-prayer">Morning Prayer Room</option>
          <option value="sunday-service">Sunday Service Room</option>
          <option value="bible-study">Bible Study Room</option>
        </select>

        <button onclick="joinRoom()">Join Prayer Room</button>
      </div>

      <div id="roomPanel" class="room-panel hidden">
        <h2 id="roomTitle">Prayer Room</h2>
        <p id="userStatus">Not connected</p>

        <div class="controls">
          <button onclick="raiseHand()">✋ Raise Hand</button>
          <button onclick="toggleMic()">🎙️ Mic</button>
          <button class="danger" onclick="leaveRoom()">Leave</button>
        </div>

        <div id="adminPanel" class="admin-panel hidden">
          <h3>Admin Control</h3>
          <button>Mute All</button>
          <button>Lock Room</button>
          <button>Allow Speaker</button>
        </div>
      </div>

      <div class="room-list">
        <h3>Available Rooms</h3>
        <div>📖 Morning Prayer</div>
        <div>⛪ Sunday Service</div>
        <div>📚 Bible Study</div>
        <div>❤️ Prayer Request</div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
