<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahima Ministry Connect</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0b2a63, #d4af37);
      color: white;
    }
    .app {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 22px;
      padding: 24px;
      text-align: center;
    }
    h1 { color: #d4af37; }
    input, select, button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }
    button {
      background: #d4af37;
      font-weight: bold;
      cursor: pointer;
    }
    .secondary {
      background: rgba(255,255,255,0.15);
      color: white;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <h1>Mahima Ministry</h1>
      <h2>Audio Prayer Room</h2>

      <input id="name" placeholder="আপনার নাম লিখুন" />

      <select id="role">
        <option value="member">Member</option>
        <option value="admin">Admin</option>
      </select>

      <button onclick="joinRoom()">Join Prayer Room</button>
      <button class="secondary">Raise Hand</button>

      <p id="status">Status: Not Connected</p>
    </div>
  </div>

  <script>
    function joinRoom() {
      const name = document.getElementById("name").value;
      const role = document.getElementById("role").value;

      if (!name) {
        alert("নাম লিখুন");
        return;
      }

      document.getElementById("status").innerText =
        "Joined as " + role + ": " + name;
    }
  </script>
</body>
</html>
